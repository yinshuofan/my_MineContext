<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DevTools{% endblock %} - MineContext Console</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/console/static/css/console.css">
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Top Navbar -->
    <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top px-3">
        <a class="navbar-brand" href="/console/agents">MineContext</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#consoleNav" aria-controls="consoleNav"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="consoleNav">
            <ul class="navbar-nav nav-pills me-auto mb-2 mb-md-0" id="mainNav">
                <li class="nav-item">
                    <a class="nav-link" href="/console/agents" data-path="/console/agents">Agent 调试台</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/console/memory" data-path="/console/memory">记忆浏览器</a>
                </li>
            </ul>
            <div class="d-flex align-items-center">
                <button class="btn btn-outline-light btn-sm"
                        onclick="window.apiAuth && window.apiAuth.showAPIKeyManager()"
                        title="API Key 设置">
                    <i data-feather="key" style="width:16px;height:16px;"></i>
                    <span class="d-none d-md-inline ms-1">API Key</span>
                </button>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons@4.28.0/dist/feather.min.js"></script>
    <script src="/static/js/api_auth.js"></script>
    <script src="/console/static/js/shared.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Highlight active nav link
            var path = window.location.pathname;
            document.querySelectorAll('#mainNav .nav-link').forEach(function(link) {
                if (link.getAttribute('data-path') === path) {
                    link.classList.add('active');
                }
            });
            // Replace feather icons
            if (typeof feather !== 'undefined') {
                feather.replace();
            }
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
