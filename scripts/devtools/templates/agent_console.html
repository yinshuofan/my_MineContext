{% extends "base.html" %}

{% block title %}Agent 调试台{% endblock %}

{% block content %}
<div class="console-main">
    <div class="console-container">
        <!-- Left Sidebar: Agent List -->
        <div class="console-sidebar">
            <div class="sidebar-header">
                <i data-feather="users" style="width:16px;height:16px;"></i>
                Agents
                <button class="btn btn-sm btn-outline-success ms-auto" style="padding:2px 8px;font-size:0.75rem;"
                        onclick="showCreateAgentModal()" title="创建 Agent">+New</button>
            </div>
            <div style="padding:8px 10px 4px;">
                <input type="text" class="form-control form-control-sm" id="agentSearch"
                       placeholder="搜索 Agent..." oninput="filterAgentList(this.value)">
            </div>
            <div class="sidebar-list" id="agentList">
                <!-- Agent items rendered by JS -->
            </div>
            <div class="sidebar-footer" id="agentCount">0 个 Agent</div>
        </div>

        <!-- Right Content: Tabs -->
        <div class="console-content">
            <ul class="nav nav-tabs mb-3" id="agentTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="tab-info-btn" data-bs-toggle="tab"
                            data-bs-target="#tab-info" type="button" role="tab"
                            aria-controls="tab-info" aria-selected="true">基本信息</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="tab-batches-btn" data-bs-toggle="tab"
                            data-bs-target="#tab-batches" type="button" role="tab"
                            aria-controls="tab-batches" aria-selected="false">消息追踪</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="tab-contexts-btn" data-bs-toggle="tab"
                            data-bs-target="#tab-contexts" type="button" role="tab"
                            aria-controls="tab-contexts" aria-selected="false">关联 Contexts</button>
                </li>
            </ul>

            <div class="tab-content">
                <div class="tab-pane fade show active" id="tab-info" role="tabpanel" aria-labelledby="tab-info-btn">
                    <div id="infoArea">
                        <div class="text-muted text-center py-5">
                            <i data-feather="users" style="width:48px;height:48px;" class="mb-3"></i>
                            <p>请从左侧选择一个 Agent</p>
                        </div>
                    </div>
                </div>
                <div class="tab-pane fade" id="tab-batches" role="tabpanel" aria-labelledby="tab-batches-btn">
                    <!-- Filled in Task 6 -->
                </div>
                <div class="tab-pane fade" id="tab-contexts" role="tabpanel" aria-labelledby="tab-contexts-btn">
                    <!-- Filled in Task 6 -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Create Agent Modal -->
<div class="modal fade" id="createAgentModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">创建 Agent</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Agent ID <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="newAgentId" placeholder="唯一标识符" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">名称 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="newAgentName" placeholder="Agent 名称" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">描述</label>
                    <textarea class="form-control" id="newAgentDesc" rows="2" placeholder="可选描述"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-success" onclick="createAgent()">创建</button>
            </div>
        </div>
    </div>
</div>

<!-- Add Event Modal -->
<div class="modal fade" id="addEventModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">添加 Base Event</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">标题 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="newEventTitle" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">摘要 <span class="text-danger">*</span></label>
                    <textarea class="form-control" id="newEventSummary" rows="3" required></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">事件时间</label>
                    <input type="datetime-local" class="form-control" id="newEventTime">
                </div>
                <div class="mb-3">
                    <label class="form-label">关键词</label>
                    <input type="text" class="form-control" id="newEventKeywords" placeholder="逗号分隔，如: 旅行, 签证, 亚洲">
                </div>
                <div class="mb-3">
                    <label class="form-label">重要性: <span id="importanceValue">5</span></label>
                    <input type="range" class="form-range" id="newEventImportance" min="0" max="10" value="5"
                           oninput="document.getElementById('importanceValue').textContent=this.value">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-success" onclick="addBaseEvent()">添加</button>
            </div>
        </div>
    </div>
</div>

<!-- Batch Import Modal -->
<div class="modal fade" id="batchImportModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">批量导入 Base Events (JSON)</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted small mb-2">
                    粘贴符合 API 格式的 JSON，或直接把 .json 文件拖到下方输入框。支持嵌套层级结构（hierarchy_level + children）。
                    <button type="button" class="btn btn-link btn-sm p-0 align-baseline" onclick="fillBatchExample()">填充示例</button>
                    &middot;
                    <button type="button" class="btn btn-link btn-sm p-0 align-baseline" onclick="document.getElementById('batchFileInput').click()">选择文件</button>
                    <input type="file" id="batchFileInput" accept=".json,application/json" class="d-none" onchange="handleBatchFile(this.files[0]); this.value='';">
                </p>
                <textarea class="form-control font-monospace" id="batchJsonInput" rows="16"
                          placeholder='{"events": [...]}  或把 .json 文件拖到这里'
                          ondragover="batchDragOver(event)"
                          ondragleave="batchDragLeave(event)"
                          ondrop="batchDrop(event)"></textarea>
                <div id="batchError" class="text-danger small mt-2 d-none"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-success" id="batchSubmitBtn" onclick="submitBatchImport()">导入</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<style>
    /* --- Agent Console specifics --- */
    .detail-card { margin-bottom: 16px; }
    .detail-card .card-header h6[data-bs-toggle] { cursor: pointer; }
    .profile-display {
        white-space: pre-wrap;
        background: #f8f9fa;
        border-radius: 6px;
        padding: 12px;
        min-height: 60px;
    }
    .event-item { border-left: 3px solid #198754; padding-left: 12px; margin-bottom: 8px; }
    .event-item-1 { border-left-color: #0d6efd; }
    .event-item-2 { border-left-color: #6f42c1; }
    .event-item-3 { border-left-color: #dc3545; }
    .tree-children {
        padding-left: 20px;
        border-left: 2px solid #dee2e6;
        margin-left: 8px;
        margin-top: 4px;
    }
    .tree-toggle { cursor: pointer; user-select: none; }
    .tree-toggle:hover { opacity: 0.7; }
    #batchJsonInput.drop-active {
        border-color: #0d6efd;
        box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
        background-color: #f0f7ff;
    }

    /* --- Tab 2: Message Tracing --- */
    .expand-btn { cursor: pointer; transition: transform 0.2s; }
    .expand-btn.open { transform: rotate(90deg); }
    .msg-bubble { padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; max-width: 85%; }
    .msg-user { background: #e3f2fd; margin-left: auto; }
    .msg-assistant { background: #f5f5f5; }
    .msg-system { background: #fff3cd; font-style: italic; }
    .batch-ctx-card { border-left: 3px solid; padding: 10px 14px; margin-bottom: 8px; border-radius: 4px; background: #fff; }
    .batch-ctx-card-event { border-left-color: #ffc107; }
    .batch-ctx-card-knowledge { border-left-color: #6f42c1; }
    .batch-ctx-card-agent_profile { border-left-color: #0d6efd; }
    .batch-ctx-card-profile { border-left-color: #0d6efd; }
    .batch-ctx-card-document { border-left-color: #198754; }
</style>
<script src="/console/static/js/agent_console.js"></script>
{% endblock %}
