{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">系统设置</h1>
        <button type="button" class="btn btn-warning" onclick="applySettings()">
            <i class="bi bi-arrow-repeat"></i> 应用设置
        </button>
    </div>

    <ul class="nav nav-tabs" id="settingsTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="model-tab" data-bs-toggle="tab" data-bs-target="#model" type="button" role="tab">
                <i class="bi bi-cpu"></i> 模型配置
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="capture-tab" data-bs-toggle="tab" data-bs-target="#capture" type="button" role="tab">
                <i class="bi bi-inbox"></i> 采集配置
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="processing-tab" data-bs-toggle="tab" data-bs-target="#processing" type="button" role="tab">
                <i class="bi bi-gear"></i> 处理配置
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="scheduler-tab" data-bs-toggle="tab" data-bs-target="#scheduler" type="button" role="tab">
                <i class="bi bi-clock"></i> 调度器
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="cache-tab" data-bs-toggle="tab" data-bs-target="#cache" type="button" role="tab">
                <i class="bi bi-memory"></i> 记忆缓存
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="prompts-tab" data-bs-toggle="tab" data-bs-target="#prompts" type="button" role="tab">
                <i class="bi bi-code-square"></i> 提示词
            </button>
        </li>
    </ul>

    <div class="tab-content" id="settingsTabContent">

        <!-- ==================== Tab 1: 模型配置 ==================== -->
        <div class="tab-pane fade show active" id="model" role="tabpanel">
            <div class="row mt-4">
                <div class="col-md-10">
                    <!-- LLM 文本模型 -->
                    <div class="card mb-4">
                        <div class="card-header"><strong>LLM 文本模型 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="负责对话分析、知识提取、摘要生成等核心文本处理任务"></i></strong></div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="llm_provider" class="form-label">服务商 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="影响 thinking 参数格式；所有服务商均使用 OpenAI 兼容接口"></i></label>
                                    <select class="form-select" id="llm_provider">
                                        <option value="openai">OpenAI</option>
                                        <option value="doubao">豆包</option>
                                        <option value="dashscope">通义千问</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="llm_model" class="form-label">模型名称 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="直接传递给 API 的模型 ID，如 gpt-4o、doubao-seed-1-6"></i></label>
                                    <input type="text" class="form-control" id="llm_model" placeholder="例如 gpt-4o">
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="llm_max_concurrent" class="form-label">最大并发数 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="限制同时进行的 LLM API 调用数（信号量控制），每个实例独立计数"></i></label>
                                    <input type="number" class="form-control" id="llm_max_concurrent" min="1">
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="llm_base_url" class="form-label">接口地址 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="API 基础地址，必须包含路径前缀如 /v1 或 /api/v3"></i></label>
                                    <input type="text" class="form-control" id="llm_base_url" placeholder="https://api.openai.com/v1">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="llm_api_key" class="form-label">API 密钥 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="用于 API 认证，启动时校验，缺失将报错"></i></label>
                                    <input type="password" class="form-control" id="llm_api_key">
                                </div>
                            </div>
                            <button type="button" class="btn btn-sm btn-info" onclick="validateModelSection('llm')">
                                <i class="bi bi-check-circle"></i> 测试连接
                            </button>
                        </div>
                    </div>

                    <!-- VLM 视觉模型 -->
                    <div class="card mb-4">
                        <div class="card-header"><strong>VLM 视觉语言模型 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="专用于识别扫描件、图片等视觉内容，将图像转为结构化文本"></i></strong></div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="vlm_provider" class="form-label">服务商 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="同 LLM，影响 thinking 参数格式"></i></label>
                                    <select class="form-select" id="vlm_provider">
                                        <option value="openai">OpenAI</option>
                                        <option value="doubao">豆包</option>
                                        <option value="dashscope">通义千问</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="vlm_model" class="form-label">模型名称 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="需支持图片输入的模型，用于文档图像页面分析"></i></label>
                                    <input type="text" class="form-control" id="vlm_model" placeholder="例如 gpt-4o">
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="vlm_max_concurrent" class="form-label">最大并发数 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="限制同时进行的图像识别 API 调用数"></i></label>
                                    <input type="number" class="form-control" id="vlm_max_concurrent" min="1">
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="vlm_base_url" class="form-label">接口地址 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="VLM API 基础地址，必须包含路径前缀"></i></label>
                                    <input type="text" class="form-control" id="vlm_base_url" placeholder="https://api.openai.com/v1">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="vlm_api_key" class="form-label">API 密钥 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="VLM API 认证密钥"></i></label>
                                    <input type="password" class="form-control" id="vlm_api_key">
                                </div>
                            </div>
                            <button type="button" class="btn btn-sm btn-info" onclick="validateModelSection('vlm_model')">
                                <i class="bi bi-check-circle"></i> 测试连接
                            </button>
                        </div>
                    </div>

                    <!-- Embedding 嵌入模型 -->
                    <div class="card mb-4">
                        <div class="card-header"><strong>Embedding 嵌入模型 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="将文本转为向量，支撑语义搜索、相似度匹配、知识去重等功能"></i></strong></div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-3 mb-3">
                                    <label for="emb_provider" class="form-label">服务商 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="同 LLM，影响 API 参数格式"></i></label>
                                    <select class="form-select" id="emb_provider">
                                        <option value="openai">OpenAI</option>
                                        <option value="doubao">豆包</option>
                                        <option value="dashscope">通义千问</option>
                                    </select>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label for="emb_model" class="form-label">模型名称 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="Embedding 模型 ID，如 text-embedding-3-large"></i></label>
                                    <input type="text" class="form-control" id="emb_model" placeholder="例如 text-embedding-3-large">
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label for="emb_max_concurrent" class="form-label">最大并发数 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="限制同时进行的向量化 API 调用数；通常设为 LLM 的 2 倍（向量化更快）"></i></label>
                                    <input type="number" class="form-control" id="emb_max_concurrent" min="1">
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label for="emb_output_dim" class="form-label">输出维度 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="向量截断维度，必须与向量数据库索引维度一致；不匹配将导致写入失败"></i></label>
                                    <input type="number" class="form-control" id="emb_output_dim" min="1">
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="emb_base_url" class="form-label">接口地址 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="Embedding API 基础地址"></i></label>
                                    <input type="text" class="form-control" id="emb_base_url" placeholder="https://api.openai.com/v1">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="emb_api_key" class="form-label">API 密钥 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="Embedding API 认证密钥"></i></label>
                                    <input type="password" class="form-control" id="emb_api_key">
                                </div>
                            </div>
                            <button type="button" class="btn btn-sm btn-info" onclick="validateModelSection('embedding_model')">
                                <i class="bi bi-check-circle"></i> 测试连接
                            </button>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-primary" onclick="saveAllModels()">
                            <i class="bi bi-save"></i> 全部保存
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="loadModelSettings()">
                            <i class="bi bi-arrow-clockwise"></i> 重置
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ==================== Tab 2: 采集配置 ==================== -->
        <div class="tab-pane fade" id="capture" role="tabpanel">
            <div class="row mt-4">
                <div class="col-md-10">
                    <form id="captureForm">
                        <div class="settings-master-toggle">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="capture_enabled">
                                <label class="form-check-label fw-bold" for="capture_enabled">启用采集 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="采集模块总开关；各子模块还有独立开关"></i></label>
                            </div>
                        </div>

                        <!-- 文本对话采集 -->
                        <div class="card settings-card mb-4">
                            <div class="card-header">
                                <strong>文本对话采集 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="接收通过 /api/push/chat 推送的对话消息，缓冲后送入处理管线"></i></strong>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="text_chat_enabled">
                                    <label class="form-check-label" for="text_chat_enabled">启用</label>
                                </div>
                            </div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="text_chat_buffer_size" class="form-label">缓冲区大小 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="每个用户的消息在 Redis 中积累到此数量后统一送入处理（如设为 4，则每 4 条消息触发一次处理）"></i></label>
                                        <input type="number" class="form-control" id="text_chat_buffer_size" min="1">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 文件夹监控 -->
                        <div class="card settings-card mb-4">
                            <div class="card-header">
                                <strong>文件夹监控 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="定期轮询指定文件夹，通过文件哈希和修改时间检测新增/修改/删除的文档"></i></strong>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="folder_monitor_enabled">
                                    <label class="form-check-label" for="folder_monitor_enabled">启用</label>
                                </div>
                            </div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-4 mb-3">
                                        <label for="folder_monitor_interval" class="form-label">监控间隔 (秒) <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="两次文件夹扫描之间的等待时间；值越小检测越快，但 CPU 开销越大"></i></label>
                                        <input type="number" class="form-control" id="folder_monitor_interval" min="1">
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="folder_monitor_max_file_size" class="form-label">最大文件大小 (MB) <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="超过此字节数的文件将被跳过（注意：单位为字节，如 104857600 = 100MB）"></i></label>
                                        <input type="number" class="form-control" id="folder_monitor_max_file_size" min="1">
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <div class="form-switch-centered">
                                            <div>
                                                <div class="form-check form-switch mb-1">
                                                    <input class="form-check-input" type="checkbox" id="folder_monitor_recursive">
                                                    <label class="form-check-label" for="folder_monitor_recursive">递归扫描 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="开启时递归扫描所有子文件夹；关闭时仅监控文件夹根目录下的文件"></i></label>
                                                </div>
                                                <div class="form-check form-switch">
                                                    <input class="form-check-input" type="checkbox" id="folder_monitor_initial_scan">
                                                    <label class="form-check-label" for="folder_monitor_initial_scan">启动时扫描 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="启动时扫描文件夹中已有的文件；关闭则只检测启动后新增/修改的文件"></i></label>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label for="folder_monitor_paths" class="form-label">监控文件夹路径 (每行一个) <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="要监控的本地文件夹绝对路径，每行一个"></i></label>
                                    <textarea class="form-control" id="folder_monitor_paths" rows="3" placeholder="/path/to/folder1&#10;/path/to/folder2"></textarea>
                                </div>
                            </div>
                        </div>

                        <!-- Vault 文档监控 -->
                        <div class="card settings-card mb-4">
                            <div class="card-header">
                                <strong>Vault 文档监控 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="定期轮询数据库中的 Vault 文档表，检测新增或更新的文档"></i></strong>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="vault_enabled">
                                    <label class="form-check-label" for="vault_enabled">启用</label>
                                </div>
                            </div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="vault_interval" class="form-label">监控间隔 (秒) <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="两次数据库轮询之间的等待时间"></i></label>
                                        <input type="number" class="form-control" id="vault_interval" min="1">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <div class="form-switch-centered">
                                            <div class="form-check form-switch">
                                                <input class="form-check-input" type="checkbox" id="vault_initial_scan">
                                                <label class="form-check-label" for="vault_initial_scan">启动时扫描 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="启动时处理 Vault 中所有已有文档；关闭则只处理启动后新增/更新的文档"></i></label>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> 保存</button>
                            <button type="button" class="btn btn-secondary" onclick="loadCaptureSettings()"><i class="bi bi-arrow-clockwise"></i> 重置</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- ==================== Tab 3: 处理配置 ==================== -->
        <div class="tab-pane fade" id="processing" role="tabpanel">
            <div class="row mt-4">
                <div class="col-md-10">
                    <form id="processingForm">
                        <div class="settings-master-toggle">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="processing_enabled">
                                <label class="form-check-label fw-bold" for="processing_enabled">启用处理 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="处理模块总开关；各子模块还有独立开关"></i></label>
                            </div>
                        </div>

                        <!-- 文本对话处理器 -->
                        <div class="card settings-card mb-4">
                            <div class="card-header">
                                <strong>文本对话处理器 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="调用 LLM 分析对话内容，提取用户画像、实体、事件、知识四类结构化记忆"></i></strong>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="text_chat_proc_enabled">
                                    <label class="form-check-label" for="text_chat_proc_enabled">启用</label>
                                </div>
                            </div>
                        </div>

                        <!-- 文档处理器 -->
                        <div class="card settings-card mb-4">
                            <div class="card-header">
                                <strong>文档处理器 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="处理上传的文档和网页：文本文件语义分块，PDF/图片调用 VLM 识别，表格文件专用解析"></i></strong>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="doc_proc_enabled">
                                    <label class="form-check-label" for="doc_proc_enabled">启用</label>
                                </div>
                            </div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="doc_proc_batch_size" class="form-label">批处理大小 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="每批同时处理的文档数量"></i></label>
                                        <input type="number" class="form-control" id="doc_proc_batch_size" min="1">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="doc_proc_batch_timeout" class="form-label">批处理超时 (秒) <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="等待凑满一批的超时时间，超时后立即开始处理已有文档"></i></label>
                                        <input type="number" class="form-control" id="doc_proc_batch_timeout" min="1">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 知识合并器 -->
                        <div class="card settings-card mb-4">
                            <div class="card-header">
                                <strong>知识合并器 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="对新入库的知识条目进行去重：查找语义相似的已有条目并合并，防止重复存储"></i></strong>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="merger_enabled">
                                    <label class="form-check-label" for="merger_enabled">启用</label>
                                </div>
                            </div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-4 mb-3">
                                        <label for="merger_threshold" class="form-label">相似度阈值 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="向量相似度低于此值的条目直接跳过，不进入合并判断（0~1）"></i></label>
                                        <input type="number" class="form-control" id="merger_threshold" min="0" max="1" step="0.01">
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <div class="form-switch-centered">
                                            <div class="form-check form-switch">
                                                <input class="form-check-input" type="checkbox" id="merger_intelligent">
                                                <label class="form-check-label" for="merger_intelligent">智能合并 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="开启后综合评估关键词重叠(30%)+实体重叠(30%)+向量相似度(40%)；关闭则仅看向量相似度"></i></label>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <div class="form-switch-centered">
                                            <div class="form-check form-switch">
                                                <input class="form-check-input" type="checkbox" id="merger_memory_mgmt">
                                                <label class="form-check-label" for="merger_memory_mgmt">记忆管理 <i class="bi bi-info-circle settings-tip" data-bs-toggle="tooltip" title="开启遗忘曲线机制：根据知识条目的年龄和重要性自动清理低价值旧条目"></i></label>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-4 mb-3">
