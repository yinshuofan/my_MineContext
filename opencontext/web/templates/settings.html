{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">系统设置</h1>
        <button type="button" class="btn btn-warning" onclick="applySettings()">
            <i class="bi bi-arrow-repeat"></i> 应用设置
        </button>
    </div>

    <ul class="nav nav-tabs" id="settingsTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="model-tab" data-bs-toggle="tab" data-bs-target="#model" type="button" role="tab">
                <i class="bi bi-cpu"></i> 模型配置
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="capture-tab" data-bs-toggle="tab" data-bs-target="#capture" type="button" role="tab">
                <i class="bi bi-inbox"></i> 采集配置
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="processing-tab" data-bs-toggle="tab" data-bs-target="#processing" type="button" role="tab">
                <i class="bi bi-gear"></i> 处理配置
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="scheduler-tab" data-bs-toggle="tab" data-bs-target="#scheduler" type="button" role="tab">
                <i class="bi bi-clock"></i> 调度与缓存
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="prompts-tab" data-bs-toggle="tab" data-bs-target="#prompts" type="button" role="tab">
                <i class="bi bi-code-square"></i> 提示词
            </button>
        </li>
    </ul>

    <div class="tab-content" id="settingsTabContent">

        <!-- ==================== Tab 1: 模型配置 ==================== -->
        <div class="tab-pane fade show active" id="model" role="tabpanel">
            <div class="row mt-4">
                <div class="col-md-10">
                    <!-- LLM 文本模型 -->
                    <div class="card mb-4">
                        <div class="card-header"><strong>LLM 文本模型</strong></div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="llm_provider" class="form-label">服务商</label>
                                    <select class="form-select" id="llm_provider">
                                        <option value="openai">OpenAI</option>
                                        <option value="doubao">豆包</option>
                                        <option value="dashscope">通义千问</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="llm_model" class="form-label">模型名称</label>
                                    <input type="text" class="form-control" id="llm_model" placeholder="例如 gpt-4o">
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="llm_max_concurrent" class="form-label">最大并发数</label>
                                    <input type="number" class="form-control" id="llm_max_concurrent" min="1">
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="llm_base_url" class="form-label">接口地址</label>
                                    <input type="text" class="form-control" id="llm_base_url" placeholder="https://api.openai.com/v1">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="llm_api_key" class="form-label">API 密钥</label>
                                    <input type="password" class="form-control" id="llm_api_key">
                                </div>
                            </div>
                            <button type="button" class="btn btn-sm btn-info" onclick="validateModelSection('llm')">
                                <i class="bi bi-check-circle"></i> 测试连接
                            </button>
                        </div>
                    </div>

                    <!-- VLM 视觉模型 -->
                    <div class="card mb-4">
                        <div class="card-header"><strong>VLM 视觉语言模型</strong></div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="vlm_provider" class="form-label">服务商</label>
                                    <select class="form-select" id="vlm_provider">
                                        <option value="openai">OpenAI</option>
                                        <option value="doubao">豆包</option>
                                        <option value="dashscope">通义千问</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="vlm_model" class="form-label">模型名称</label>
                                    <input type="text" class="form-control" id="vlm_model" placeholder="例如 gpt-4o">
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="vlm_max_concurrent" class="form-label">最大并发数</label>
                                    <input type="number" class="form-control" id="vlm_max_concurrent" min="1">
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="vlm_base_url" class="form-label">接口地址</label>
                                    <input type="text" class="form-control" id="vlm_base_url" placeholder="https://api.openai.com/v1">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="vlm_api_key" class="form-label">API 密钥</label>
                                    <input type="password" class="form-control" id="vlm_api_key">
                                </div>
                            </div>
                            <button type="button" class="btn btn-sm btn-info" onclick="validateModelSection('vlm_model')">
                                <i class="bi bi-check-circle"></i> 测试连接
                            </button>
                        </div>
                    </div>

                    <!-- Embedding 嵌入模型 -->
                    <div class="card mb-4">
                        <div class="card-header"><strong>Embedding 嵌入模型</strong></div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-3 mb-3">
                                    <label for="emb_provider" class="form-label">服务商</label>
                                    <select class="form-select" id="emb_provider">
                                        <option value="openai">OpenAI</option>
                                        <option value="doubao">豆包</option>
                                        <option value="dashscope">通义千问</option>
                                    </select>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label for="emb_model" class="form-label">模型名称</label>
                                    <input type="text" class="form-control" id="emb_model" placeholder="例如 text-embedding-3-large">
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label for="emb_max_concurrent" class="form-label">最大并发数</label>
                                    <input type="number" class="form-control" id="emb_max_concurrent" min="1">
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label for="emb_output_dim" class="form-label">输出维度</label>
                                    <input type="number" class="form-control" id="emb_output_dim" min="1">
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="emb_base_url" class="form-label">接口地址</label>
                                    <input type="text" class="form-control" id="emb_base_url" placeholder="https://api.openai.com/v1">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="emb_api_key" class="form-label">API 密钥</label>
                                    <input type="password" class="form-control" id="emb_api_key">
                                </div>
                            </div>
                            <button type="button" class="btn btn-sm btn-info" onclick="validateModelSection('embedding_model')">
                                <i class="bi bi-check-circle"></i> 测试连接
                            </button>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-primary" onclick="saveAllModels()">
                            <i class="bi bi-save"></i> 全部保存
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="loadModelSettings()">
                            <i class="bi bi-arrow-clockwise"></i> 重置
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ==================== Tab 2: 采集配置 ==================== -->
        <div class="tab-pane fade" id="capture" role="tabpanel">
            <div class="row mt-4">
                <div class="col-md-10">
                    <form id="captureForm">
                        <div class="mb-3 form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="capture_enabled">
                            <label class="form-check-label fw-bold" for="capture_enabled">启用采集</label>
                        </div>

                        <!-- 文本对话采集 -->
                        <div class="card mb-4">
                            <div class="card-header"><strong>文本对话采集</strong></div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-4 mb-3 form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="text_chat_enabled">
                                        <label class="form-check-label" for="text_chat_enabled">启用</label>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="text_chat_buffer_size" class="form-label">缓冲区大小</label>
                                        <input type="number" class="form-control" id="text_chat_buffer_size" min="1">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 文件夹监控 -->
                        <div class="card mb-4">
                            <div class="card-header"><strong>文件夹监控</strong></div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-3 mb-3 form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="folder_monitor_enabled">
                                        <label class="form-check-label" for="folder_monitor_enabled">启用</label>
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="folder_monitor_interval" class="form-label">监控间隔 (秒)</label>
                                        <input type="number" class="form-control" id="folder_monitor_interval" min="1">
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="folder_monitor_max_file_size" class="form-label">最大文件大小 (MB)</label>
                                        <input type="number" class="form-control" id="folder_monitor_max_file_size" min="1">
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <div class="form-check form-switch mt-4">
                                            <input class="form-check-input" type="checkbox" id="folder_monitor_recursive">
                                            <label class="form-check-label" for="folder_monitor_recursive">递归扫描</label>
                                        </div>
                                        <div class="form-check form-switch">
                                            <input class="form-check-input" type="checkbox" id="folder_monitor_initial_scan">
                                            <label class="form-check-label" for="folder_monitor_initial_scan">启动时扫描</label>
                                        </div>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label for="folder_monitor_paths" class="form-label">监控文件夹路径 (每行一个)</label>
                                    <textarea class="form-control" id="folder_monitor_paths" rows="3" placeholder="/path/to/folder1&#10;/path/to/folder2"></textarea>
                                </div>
                            </div>
                        </div>

                        <!-- Vault 文档监控 -->
                        <div class="card mb-4">
                            <div class="card-header"><strong>Vault 文档监控</strong></div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-4 mb-3 form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="vault_enabled">
                                        <label class="form-check-label" for="vault_enabled">启用</label>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="vault_interval" class="form-label">监控间隔 (秒)</label>
                                        <input type="number" class="form-control" id="vault_interval" min="1">
                                    </div>
                                    <div class="col-md-4 mb-3 form-check form-switch mt-4">
                                        <input class="form-check-input" type="checkbox" id="vault_initial_scan">
                                        <label class="form-check-label" for="vault_initial_scan">启动时扫描</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> 保存</button>
                            <button type="button" class="btn btn-secondary" onclick="loadCaptureSettings()"><i class="bi bi-arrow-clockwise"></i> 重置</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- ==================== Tab 3: 处理配置 ==================== -->
        <div class="tab-pane fade" id="processing" role="tabpanel">
            <div class="row mt-4">
                <div class="col-md-10">
                    <form id="processingForm">
                        <div class="mb-3 form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="processing_enabled">
                            <label class="form-check-label fw-bold" for="processing_enabled">启用处理</label>
                        </div>

                        <!-- 文本对话处理器 -->
                        <div class="card mb-4">
                            <div class="card-header"><strong>文本对话处理器</strong></div>
                            <div class="card-body">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="text_chat_proc_enabled">
                                    <label class="form-check-label" for="text_chat_proc_enabled">启用</label>
                                </div>
                            </div>
                        </div>

                        <!-- 文档处理器 -->
                        <div class="card mb-4">
                            <div class="card-header"><strong>文档处理器</strong></div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-4 mb-3 form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="doc_proc_enabled">
                                        <label class="form-check-label" for="doc_proc_enabled">启用</label>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="doc_proc_batch_size" class="form-label">批处理大小</label>
                                        <input type="number" class="form-control" id="doc_proc_batch_size" min="1">
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="doc_proc_batch_timeout" class="form-label">批处理超时 (秒)</label>
                                        <input type="number" class="form-control" id="doc_proc_batch_timeout" min="1">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 知识合并器 -->
                        <div class="card mb-4">
                            <div class="card-header"><strong>知识合并器</strong></div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-4 mb-3 form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="merger_enabled">
                                        <label class="form-check-label" for="merger_enabled">启用</label>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="merger_threshold" class="form-label">相似度阈值</label>
                                        <input type="number" class="form-control" id="merger_threshold" min="0" max="1" step="0.01">
                                    </div>
                                    <div class="col-md-4 mb-3 form-check form-switch mt-4">
                                        <input class="form-check-input" type="checkbox" id="merger_intelligent">
                                        <label class="form-check-label" for="merger_intelligent">智能合并</label>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-3 mb-3 form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="merger_memory_mgmt">
                                        <label class="form-check-label" for="merger_memory_mgmt">记忆管理</label>
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="merger_retention_days" class="form-label">保留天数</label>
                                        <input type="number" class="form-control" id="merger_retention_days" min="1">
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="merger_sim_threshold" class="form-label">知识相似度阈值</label>
                                        <input type="number" class="form-control" id="merger_sim_threshold" min="0" max="1" step="0.01">
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="merger_max_merge_count" class="form-label">最大合并数</label>
                                        <input type="number" class="form-control" id="merger_max_merge_count" min="1">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 文档处理参数 -->
                        <div class="card mb-4">
                            <div class="card-header"><strong>文档处理参数</strong></div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-4 mb-3">
                                        <label for="docproc_batch_size" class="form-label">VLM 批处理大小</label>
                                        <input type="number" class="form-control" id="docproc_batch_size" min="1">
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="docproc_dpi" class="form-label">PDF DPI</label>
                                        <input type="number" class="form-control" id="docproc_dpi" min="72" max="600">
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="docproc_text_threshold" class="form-label">每页文字阈值</label>
                                        <input type="number" class="form-control" id="docproc_text_threshold" min="0">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> 保存</button>
                            <button type="button" class="btn btn-secondary" onclick="loadProcessingSettings()"><i class="bi bi-arrow-clockwise"></i> 重置</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- ==================== Tab 4: 调度与缓存 ==================== -->
        <div class="tab-pane fade" id="scheduler" role="tabpanel">
            <div class="row mt-4">
                <div class="col-md-10">
                    <form id="schedulerCacheForm">
                        <!-- 调度器 -->
                        <h4>调度器</h4>
                        <div class="mb-3 form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="scheduler_enabled">
                            <label class="form-check-label fw-bold" for="scheduler_enabled">启用调度器</label>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-4 mb-3">
                                <label for="executor_check_interval" class="form-label">检查间隔 (秒)</label>
                                <input type="number" class="form-control" id="executor_check_interval" min="1">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="executor_max_concurrent" class="form-label">最大并发数</label>
                                <input type="number" class="form-control" id="executor_max_concurrent" min="1">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="executor_lock_timeout" class="form-label">锁超时 (秒)</label>
                                <input type="number" class="form-control" id="executor_lock_timeout" min="1">
                            </div>
                        </div>

                        <!-- 记忆压缩任务 -->
                        <div class="card mb-3">
                            <div class="card-header"><strong>记忆压缩</strong></div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-3 mb-3 form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="task_mc_enabled">
                                        <label class="form-check-label" for="task_mc_enabled">启用</label>
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="task_mc_trigger" class="form-label">触发模式</label>
                                        <select class="form-select" id="task_mc_trigger">
                                            <option value="user_activity">用户活动触发</option>
                                            <option value="periodic">定时触发</option>
                                        </select>
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="task_mc_interval" class="form-label">间隔 (秒)</label>
                                        <input type="number" class="form-control" id="task_mc_interval" min="1">
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="task_mc_ttl" class="form-label">任务 TTL (秒)</label>
                                        <input type="number" class="form-control" id="task_mc_ttl" min="1">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 数据清理任务 -->
                        <div class="card mb-3">
                            <div class="card-header"><strong>数据清理</strong></div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-2 mb-3 form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="task_dc_enabled">
                                        <label class="form-check-label" for="task_dc_enabled">启用</label>
                                    </div>
                                    <div class="col-md-2 mb-3">
                                        <label for="task_dc_trigger" class="form-label">触发模式</label>
                                        <select class="form-select" id="task_dc_trigger">
                                            <option value="periodic">定时触发</option>
                                            <option value="user_activity">用户活动触发</option>
                                        </select>
                                    </div>
                                    <div class="col-md-2 mb-3">
                                        <label for="task_dc_interval" class="form-label">间隔 (秒)</label>
                                        <input type="number" class="form-control" id="task_dc_interval" min="1">
                                    </div>
                                    <div class="col-md-2 mb-3">
                                        <label for="task_dc_timeout" class="form-label">超时 (秒)</label>
                                        <input type="number" class="form-control" id="task_dc_timeout" min="1">
                                    </div>
                                    <div class="col-md-2 mb-3">
                                        <label for="task_dc_retention" class="form-label">保留天数</label>
                                        <input type="number" class="form-control" id="task_dc_retention" min="1">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 层级摘要任务 -->
                        <div class="card mb-3">
                            <div class="card-header"><strong>层级摘要</strong></div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-3 mb-3 form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="task_hs_enabled">
                                        <label class="form-check-label" for="task_hs_enabled">启用</label>
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="task_hs_trigger" class="form-label">触发模式</label>
                                        <select class="form-select" id="task_hs_trigger">
                                            <option value="user_activity">用户活动触发</option>
                                            <option value="periodic">定时触发</option>
                                        </select>
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="task_hs_interval" class="form-label">间隔 (秒)</label>
                                        <input type="number" class="form-control" id="task_hs_interval" min="1">
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="task_hs_timeout" class="form-label">超时 (秒)</label>
                                        <input type="number" class="form-control" id="task_hs_timeout" min="1">
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-3 mb-3">
                                        <label for="task_hs_ttl" class="form-label">任务 TTL (秒)</label>
                                        <input type="number" class="form-control" id="task_hs_ttl" min="1">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <hr class="my-4">

                        <!-- 记忆缓存 -->
                        <h4>记忆缓存</h4>
                        <div class="row mb-4">
                            <div class="col-md-3 mb-3">
                                <label for="cache_snapshot_ttl" class="form-label">快照 TTL (秒)</label>
                                <input type="number" class="form-control" id="cache_snapshot_ttl" min="1">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label for="cache_recent_days" class="form-label">最近天数</label>
                                <input type="number" class="form-control" id="cache_recent_days" min="1">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label for="cache_max_recently" class="form-label">最大最近访问数</label>
                                <input type="number" class="form-control" id="cache_max_recently" min="1">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label for="cache_max_today_events" class="form-label">今日最大事件数</label>
                                <input type="number" class="form-control" id="cache_max_today_events" min="1">
                            </div>
                        </div>
                        <div class="row mb-4">
                            <div class="col-md-3 mb-3">
                                <label for="cache_max_documents" class="form-label">最大最近文档数</label>
                                <input type="number" class="form-control" id="cache_max_documents" min="1">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label for="cache_max_knowledge" class="form-label">最大最近知识数</label>
                                <input type="number" class="form-control" id="cache_max_knowledge" min="1">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label for="cache_accessed_ttl" class="form-label">访问 TTL (秒)</label>
                                <input type="number" class="form-control" id="cache_accessed_ttl" min="1">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label for="cache_max_entities" class="form-label">最大实体数</label>
                                <input type="number" class="form-control" id="cache_max_entities" min="1">
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> 保存</button>
                            <button type="button" class="btn btn-secondary" onclick="loadSchedulerCacheSettings()"><i class="bi bi-arrow-clockwise"></i> 重置</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- ==================== Tab 5: 提示词 ==================== -->
        <div class="tab-pane fade" id="prompts" role="tabpanel">
            <div class="row mt-4">
                <div class="col-md-12">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="d-flex align-items-center gap-3">
                            <h4 class="mb-0">提示词管理</h4>
                            <select class="form-select form-select-sm" style="width: 200px;" id="promptLanguage" onchange="changePromptLanguage()">
                                <option value="zh">中文 (zh)</option>
                                <option value="en">英文 (en)</option>
                            </select>
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-primary" onclick="saveAllPrompts()">
                                <i class="bi bi-save"></i> 全部保存
                            </button>
                            <button class="btn btn-secondary" onclick="exportPrompts()">
                                <i class="bi bi-download"></i> 导出
                            </button>
                            <label class="btn btn-secondary" for="importFile">
                                <i class="bi bi-upload"></i> 导入
                            </label>
                            <input type="file" id="importFile" accept=".yaml,.yml" style="display:none" onchange="importPrompts(event)">
                            <button class="btn btn-warning" onclick="resetAllSettings()">
                                <i class="bi bi-arrow-counterclockwise"></i> 重置全部
                            </button>
                        </div>
                    </div>

                    <div class="row">
                        <!-- 左侧: 提示词树 -->
                        <div class="col-md-4">
                            <div class="card">
                                <div class="card-header">提示词目录</div>
                                <div class="card-body p-0">
                                    <div id="promptTree" class="list-group list-group-flush" style="max-height: 600px; overflow-y: auto;">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- 右侧: 编辑器 -->
                        <div class="col-md-8">
                            <div class="card">
                                <div class="card-header">
                                    <span id="currentPromptKey" class="text-muted">从左侧目录选择一个提示词</span>
                                </div>
                                <div class="card-body">
                                    <textarea class="form-control font-monospace" id="promptEditor" rows="20" placeholder="请从左侧选择要编辑的提示词..."></textarea>
                                    <button class="btn btn-primary mt-3" onclick="saveCurrentPrompt()">
                                        <i class="bi bi-save"></i> 保存当前
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="settingsToast" class="toast" role="alert">
        <div class="toast-header">
            <strong class="me-auto">系统设置</strong>
            <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
        </div>
        <div class="toast-body" id="toastMessage">
            OK
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/settings.js"></script>
{% endblock %}
