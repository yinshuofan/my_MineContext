{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Agent 管理</h1>
</div>

<div class="row">
    <!-- Left: Agent List -->
    <div class="col-md-3">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Agent 列表</h5>
                <button class="btn btn-sm btn-success" data-bs-toggle="modal" data-bs-target="#createAgentModal">+ 创建</button>
            </div>
            <div class="card-body p-0" id="agentListBody">
                <div class="text-muted text-center py-4" id="agentListEmpty">
                    <small>暂无 Agent</small>
                </div>
                <div class="list-group list-group-flush" id="agentList"></div>
            </div>
        </div>
    </div>

    <!-- Right: Agent Detail -->
    <div class="col-md-9">
        <div id="agentDetailArea">
            <div class="text-muted text-center py-5">
                <i data-feather="users" class="mb-3" style="width: 48px; height: 48px;"></i>
                <p>选择一个 Agent 查看详情，或创建新的 Agent</p>
            </div>
        </div>
    </div>
</div>

<!-- Create Agent Modal -->
<div class="modal fade" id="createAgentModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">创建 Agent</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Agent ID <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="newAgentId" placeholder="唯一标识符" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">名称 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="newAgentName" placeholder="Agent 名称" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">描述</label>
                    <textarea class="form-control" id="newAgentDesc" rows="2" placeholder="可选描述"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-success" onclick="createAgent()">创建</button>
            </div>
        </div>
    </div>
</div>

<!-- Add Event Modal -->
<div class="modal fade" id="addEventModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">添加 Base Event</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">标题 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="newEventTitle" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">摘要 <span class="text-danger">*</span></label>
                    <textarea class="form-control" id="newEventSummary" rows="3" required></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">事件时间</label>
                    <input type="datetime-local" class="form-control" id="newEventTime">
                </div>
                <div class="mb-3">
                    <label class="form-label">关键词</label>
                    <input type="text" class="form-control" id="newEventKeywords" placeholder="逗号分隔，如: 旅行, 签证, 亚洲">
                </div>
                <div class="mb-3">
                    <label class="form-label">重要性 (0-10)</label>
                    <input type="number" class="form-control" id="newEventImportance" value="5" min="0" max="10">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-success" onclick="addBaseEvent()">添加</button>
            </div>
        </div>
    </div>
</div>

<!-- Batch Import Modal -->
<div class="modal fade" id="batchImportModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">批量导入 Base Events (JSON)</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted small mb-2">
                    粘贴符合 API 格式的 JSON。支持嵌套层级结构（hierarchy_level + children）。
                    <a href="#" onclick="fillBatchExample(); return false;">填充示例</a>
                </p>
                <textarea class="form-control font-monospace" id="batchJsonInput" rows="16" placeholder='{"events": [...]}'></textarea>
                <div id="batchError" class="text-danger small mt-2 d-none"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-success" id="batchSubmitBtn" onclick="submitBatchImport()">导入</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<style>
    .agent-item { cursor: pointer; transition: background-color 0.15s; }
    .agent-item:hover { background-color: #f0f4f8; }
    .agent-item.active { background-color: #e8f4fd; border-left: 3px solid #0d6efd; }
    .detail-card { margin-bottom: 16px; }
    .detail-card .card-header h6[data-bs-toggle] { cursor: pointer; }
    .profile-display { white-space: pre-wrap; background: #f8f9fa; border-radius: 6px; padding: 12px; min-height: 60px; }
    .event-item { border-left: 3px solid #198754; padding-left: 12px; margin-bottom: 8px; }
    .event-item-1 { border-left-color: #0d6efd; }
    .event-item-2 { border-left-color: #6f42c1; }
    .event-item-3 { border-left-color: #dc3545; }
    .tree-children { padding-left: 20px; border-left: 2px solid #dee2e6; margin-left: 8px; margin-top: 4px; }
    .tree-toggle { cursor: pointer; user-select: none; }
    .tree-toggle:hover { opacity: 0.7; }
    .level-badge { font-size: 0.7rem; font-weight: 600; }
    .level-badge-0 { background-color: #198754; }
    .level-badge-1 { background-color: #0d6efd; }
    .level-badge-2 { background-color: #6f42c1; }
    .level-badge-3 { background-color: #dc3545; }
</style>
<script>
let selectedAgentId = null;
let _eventTreeMap = {};  // id -> tree node (with _children), built by buildEventTree
let _currentEvents = [];  // flat event list from API, used for optimistic UI updates

document.addEventListener('DOMContentLoaded', function() {
    loadAgentList();
});

// ========== Agent List ==========

async function loadAgentList() {
    try {
        const resp = await fetch('/api/agents');
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.detail || 'Failed to load agents');
        const agents = data.data.agents || [];
        renderAgentList(agents);
    } catch (e) {
        console.error('Load agents failed:', e);
    }
}

function renderAgentList(agents) {
    const list = document.getElementById('agentList');
    const empty = document.getElementById('agentListEmpty');
    if (agents.length === 0) {
        list.innerHTML = '';
        empty.classList.remove('d-none');
        return;
    }
    empty.classList.add('d-none');
    list.innerHTML = agents.map(a => `
        <a href="#" class="list-group-item list-group-item-action agent-item ${a.agent_id === selectedAgentId ? 'active' : ''}"
           data-agent-id="${esc(a.agent_id)}" onclick="selectAgent('${escAttr(a.agent_id)}'); return false;">
            <div class="fw-semibold">${esc(a.name)}</div>
            <small class="text-muted">${esc((a.description || '').substring(0, 60))}${(a.description || '').length > 60 ? '...' : ''}</small>
        </a>
    `).join('');
    feather.replace();
}

async function selectAgent(agentId) {
    selectedAgentId = agentId;
    document.querySelectorAll('.agent-item').forEach(el => {
        el.classList.toggle('active', el.dataset.agentId === agentId);
    });
    await loadAgentDetail(agentId);
}

// ========== Agent Detail ==========

async function loadAgentDetail(agentId) {
    const area = document.getElementById('agentDetailArea');
    area.innerHTML = '<div class="text-center py-5"><div class="spinner-border" role="status"></div></div>';

    try {
        const resp = await fetch(`/api/agents/${encodeURIComponent(agentId)}`);
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.detail || 'Agent not found');
        const agent = data.data.agent;

        const [profileResp, eventsResp] = await Promise.all([
            fetch(`/api/agents/${encodeURIComponent(agentId)}/base/profile`).catch(() => null),
            fetch(`/api/agents/${encodeURIComponent(agentId)}/base/events`).catch(() => null),
        ]);

        let profile = null;
        if (profileResp && profileResp.ok) {
            const pd = await profileResp.json();
            profile = pd.data.profile;
        }

        let events = [];
        if (eventsResp && eventsResp.ok) {
            const ed = await eventsResp.json();
            events = ed.data.events || [];
        }

        renderAgentDetail(agent, profile, events);
    } catch (e) {
        area.innerHTML = `<div class="alert alert-danger">加载失败: ${esc(e.message)}</div>`;
    }
}

function renderAgentDetail(agent, profile, events) {
    const area = document.getElementById('agentDetailArea');
    area.innerHTML = `
        ${renderInfoCard(agent)}
        ${renderProfileCard(profile)}
        ${renderEventsCard(events)}
    `;
    feather.replace();
}

// ---- Card 1: Basic Info ----

function renderInfoCard(agent) {
    return `
    <div class="card detail-card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h6 class="mb-0" role="button" tabindex="0" data-bs-toggle="collapse" data-bs-target="#infoCardBody"><i data-feather="info" style="width:16px;height:16px;" class="me-2"></i>基本信息</h6>
            <div>
                <button class="btn btn-sm btn-outline-primary me-1" onclick="startEditInfo()">编辑</button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteAgent()">删除</button>
            </div>
        </div>
        <div class="collapse show" id="infoCardBody">
            <div class="card-body" id="infoContent">
                <div class="row">
                    <div class="col-md-6 mb-2"><strong>Agent ID:</strong> ${esc(agent.agent_id)}</div>
                    <div class="col-md-6 mb-2"><strong>名称:</strong> <span id="infoName">${esc(agent.name)}</span></div>
                    <div class="col-12 mb-2"><strong>描述:</strong> <span id="infoDesc">${esc(agent.description || '无')}</span></div>
                    <div class="col-md-6"><small class="text-muted">创建: ${agent.created_at || '-'}</small></div>
                    <div class="col-md-6"><small class="text-muted">更新: ${agent.updated_at || '-'}</small></div>
                </div>
            </div>
        </div>
    </div>`;
}

function startEditInfo() {
    const nameEl = document.getElementById('infoName');
    const descEl = document.getElementById('infoDesc');
    const name = nameEl.textContent;
    const desc = descEl.textContent === '无' ? '' : descEl.textContent;

    nameEl.innerHTML = `<input type="text" class="form-control form-control-sm d-inline-block" style="width:200px" id="editName" value="${esc(name)}">`;
    descEl.innerHTML = `<input type="text" class="form-control form-control-sm d-inline-block" style="width:300px" id="editDesc" value="${esc(desc)}">`;

    const content = document.getElementById('infoContent');
    if (!document.getElementById('editInfoBtns')) {
        content.insertAdjacentHTML('beforeend', `
            <div id="editInfoBtns" class="mt-2">
                <button class="btn btn-sm btn-primary" onclick="saveInfo()">保存</button>
                <button class="btn btn-sm btn-secondary ms-1" onclick="loadAgentDetail(selectedAgentId)">取消</button>
            </div>
        `);
    }
}

async function saveInfo() {
    const name = document.getElementById('editName').value.trim();
    const desc = document.getElementById('editDesc').value.trim();
    if (!name) { alert('名称不能为空'); return; }
    try {
        const resp = await fetch(`/api/agents/${encodeURIComponent(selectedAgentId)}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name, description: desc})
        });
        if (!resp.ok) { const d = await resp.json(); throw new Error(d.detail || 'Update failed'); }
        loadAgentList();
        loadAgentDetail(selectedAgentId);
    } catch (e) {
        alert('更新失败: ' + e.message);
    }
}

async function deleteAgent() {
    if (!confirm(`确定要删除 Agent "${selectedAgentId}" 吗？此操作不可撤销。`)) return;
    try {
        const resp = await fetch(`/api/agents/${encodeURIComponent(selectedAgentId)}`, {method: 'DELETE'});
        if (!resp.ok) { const d = await resp.json(); throw new Error(d.detail || 'Delete failed'); }
        selectedAgentId = null;
        document.getElementById('agentDetailArea').innerHTML = `
            <div class="text-muted text-center py-5">
                <i data-feather="users" class="mb-3" style="width: 48px; height: 48px;"></i>
                <p>选择一个 Agent 查看详情，或创建新的 Agent</p>
            </div>`;
        feather.replace();
        loadAgentList();
    } catch (e) {
        alert('删除失败: ' + e.message);
    }
}

// ---- Card 2: Base Profile ----

function renderProfileCard(profile) {
    const text = profile ? (profile.factual_profile || '无内容') : null;
    const content = text
        ? `<div class="profile-display" id="profileText">${esc(text)}</div>`
        : '<p class="text-muted" id="profileText">暂无 Base Profile，点击编辑添加</p>';
    return `
    <div class="card detail-card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h6 class="mb-0" role="button" tabindex="0" data-bs-toggle="collapse" data-bs-target="#profileCardBody"><i data-feather="user" style="width:16px;height:16px;" class="me-2"></i>Base Profile</h6>
            <button class="btn btn-sm btn-outline-primary" onclick="startEditProfile()">编辑</button>
        </div>
        <div class="collapse show" id="profileCardBody">
            <div class="card-body" id="profileContent">${content}</div>
        </div>
    </div>`;
}

function startEditProfile() {
    const container = document.getElementById('profileContent');
    const existing = document.getElementById('profileText');
    const text = existing ? (existing.classList.contains('profile-display') ? existing.textContent : '') : '';
    container.innerHTML = `
        <textarea class="form-control" id="editProfileText" rows="5">${esc(text)}</textarea>
        <div class="mt-2">
            <button class="btn btn-sm btn-primary" onclick="saveProfile()">保存</button>
            <button class="btn btn-sm btn-secondary ms-1" onclick="loadAgentDetail(selectedAgentId)">取消</button>
        </div>
    `;
}

async function saveProfile() {
    const text = document.getElementById('editProfileText').value.trim();
    if (!text) { alert('Profile 内容不能为空'); return; }
    try {
        const resp = await fetch(`/api/agents/${encodeURIComponent(selectedAgentId)}/base/profile`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({factual_profile: text})
        });
        if (!resp.ok) { const d = await resp.json(); throw new Error(d.detail || 'Save failed'); }
        loadAgentDetail(selectedAgentId);
    } catch (e) {
        alert('保存失败: ' + e.message);
    }
}

// ---- Card 3: Base Events ----

function renderEventsCard(events) {
    _currentEvents = events;  // Store for optimistic updates
    let content;
    if (events.length === 0) {
        content = '<p class="text-muted">暂无 Base Events</p>';
    } else {
        const tree = buildEventTree(events);
        content = tree.map(node => renderEventNode(node)).join('');
    }
    return `
    <div class="card detail-card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h6 class="mb-0" role="button" tabindex="0" data-bs-toggle="collapse" data-bs-target="#eventsCardBody"><i data-feather="zap" style="width:16px;height:16px;" class="me-2"></i>Base Events <span class="badge bg-secondary">${events.length}</span></h6>
            <div>
                <button class="btn btn-sm btn-outline-primary me-1" onclick="showBatchImportModal()">批量导入</button>
                <button class="btn btn-sm btn-outline-success" onclick="showAddEventModal()">+ 添加</button>
            </div>
        </div>
        <div class="collapse show" id="eventsCardBody">
            <div class="card-body" id="eventsContent">${content}</div>
        </div>
    </div>`;
}

function showAddEventModal() {
    document.getElementById('newEventTitle').value = '';
    document.getElementById('newEventSummary').value = '';
    document.getElementById('newEventTime').value = '';
    document.getElementById('newEventKeywords').value = '';
    document.getElementById('newEventImportance').value = '5';
    new bootstrap.Modal(document.getElementById('addEventModal')).show();
}

async function addBaseEvent() {
    const title = document.getElementById('newEventTitle').value.trim();
    const summary = document.getElementById('newEventSummary').value.trim();
    if (!title || !summary) { alert('标题和摘要不能为空'); return; }

    const eventObj = {title, summary};
    const eventTime = document.getElementById('newEventTime').value;
    if (eventTime) eventObj.event_time_start = new Date(eventTime).toISOString();
    const kw = document.getElementById('newEventKeywords').value.trim();
    if (kw) eventObj.keywords = kw.split(',').map(s => s.trim()).filter(Boolean);
    const imp = parseInt(document.getElementById('newEventImportance').value);
    if (!isNaN(imp)) eventObj.importance = Math.max(0, Math.min(10, imp));

    try {
        const resp = await fetch(`/api/agents/${encodeURIComponent(selectedAgentId)}/base/events`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({events: [eventObj]})
        });
        if (!resp.ok) { const d = await resp.json(); throw new Error(d.detail || 'Add failed'); }
        bootstrap.Modal.getInstance(document.getElementById('addEventModal')).hide();
        loadAgentDetail(selectedAgentId);
    } catch (e) {
        alert('添加失败: ' + e.message);
    }
}

function _collectDescendantIds(node) {
    // Post-order: children's descendants first, then child itself (leaf-first)
    const ids = [];
    if (node._children) {
        for (const child of node._children) {
            ids.push(..._collectDescendantIds(child));
            ids.push(child.id);
        }
    }
    return ids;
}

async function deleteEvent(eventId) {
    const node = _eventTreeMap[eventId];
    const descendantIds = node ? _collectDescendantIds(node) : [];
    // Leaf-first order: descendants (already post-order), then the root node last
    const allIds = [...descendantIds, eventId];

    const msg = allIds.length > 1
        ? `确定删除此事件及其 ${descendantIds.length} 个子级事件？（共 ${allIds.length} 条）`
        : '确定删除此事件？';
    if (!confirm(msg)) return;

    let failed = 0;
    const deletedIds = new Set();
    for (const id of allIds) {
        try {
            const resp = await fetch(`/api/agents/${encodeURIComponent(selectedAgentId)}/base/events/${encodeURIComponent(id)}`, {method: 'DELETE'});
            if (!resp.ok) { console.error('Delete failed for event:', id); failed++; }
            else { deletedIds.add(id); }
        } catch (e) { console.error('Delete failed for event:', id, e); failed++; }
    }
    if (failed > 0) alert(`${allIds.length - failed} 条删除成功，${failed} 条删除失败`);

    // Optimistic UI: remove deleted events from local list and re-render card
    // Avoids VikingDB indexing delay causing deleted events to reappear
    const remaining = _currentEvents.filter(e => !deletedIds.has(e.id));
    const container = document.getElementById('eventsContent');
    if (container) {
        _currentEvents = remaining;
        if (remaining.length === 0) {
            container.innerHTML = '<p class="text-muted">暂无 Base Events</p>';
        } else {
            const tree = buildEventTree(remaining);
            container.innerHTML = tree.map(node => renderEventNode(node)).join('');
        }
        // Update count badge
        const badge = document.querySelector('#eventsCardBody')?.closest('.card')?.querySelector('.badge.bg-secondary');
        if (badge) badge.textContent = remaining.length;
        feather.replace();
    }
}

// ========== Event Tree ==========

function buildEventTree(events) {
    // Build a map of id -> event (with a children array)
    const map = {};
    for (const evt of events) {
        map[evt.id] = { ...evt, _children: [] };
    }
    // Use downward refs only to build parent-child relationships
    // Downward: parent (higher level) refs child (lower level)
    // Upward refs (child → parent) must be excluded to avoid inverted hierarchy
    const childIds = new Set();
    for (const evt of events) {
        if (evt.refs) {
            const evtLevel = evt.hierarchy_level || 0;
            for (const [, ids] of Object.entries(evt.refs)) {
                if (!Array.isArray(ids)) continue;
                for (const cid of ids) {
                    if (map[cid] && (map[cid].hierarchy_level || 0) < evtLevel) {
                        map[evt.id]._children.push(map[cid]);
                        childIds.add(cid);
                    }
                }
            }
        }
    }
    // Sort children by event_time_start
    for (const evt of Object.values(map)) {
        evt._children.sort((a, b) => (a.event_time_start || '').localeCompare(b.event_time_start || ''));
    }
    // Store map globally for cascade delete
    _eventTreeMap = map;
    // Roots are events that are not children of any other event
    const roots = events.filter(e => !childIds.has(e.id)).map(e => map[e.id]);
    // Sort roots: higher level first, then by event_time_start desc
    roots.sort((a, b) => (b.hierarchy_level || 0) - (a.hierarchy_level || 0) || (b.event_time_start || '').localeCompare(a.event_time_start || ''));
    return roots;
}

function renderEventNode(node) {
    const level = node.hierarchy_level || 0;
    const levelClass = level > 0 ? ` event-item-${level}` : '';
    const hasChildren = node._children && node._children.length > 0;
    const nodeId = 'evt-' + node.id.replace(/[^a-zA-Z0-9]/g, '_');

    const toggleHtml = hasChildren ? `
        <span class="tree-toggle me-1" onclick="event.stopPropagation(); toggleEvtChildren('${nodeId}', this)">
            <i data-feather="chevron-down" style="width:14px;height:14px;"></i>
        </span>` : '';

    const timeDisplay = node.event_time_start
        ? (node.event_time_end && node.event_time_end !== node.event_time_start
            ? `${new Date(node.event_time_start).toLocaleString('zh-CN')} ~ ${new Date(node.event_time_end).toLocaleString('zh-CN')}`
            : new Date(node.event_time_start).toLocaleString('zh-CN'))
        : '';

    const childrenHtml = hasChildren
        ? `<div class="tree-children" id="${nodeId}">${node._children.map(c => renderEventNode(c)).join('')}</div>`
        : '';

    return `
        <div class="event-item${levelClass}">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <div class="d-flex align-items-center">
                        ${toggleHtml}
                        <span class="badge level-badge level-badge-${level} me-1">L${level}</span>
                        <span class="fw-semibold">${esc(node.title || '未命名')}</span>
                    </div>
                    ${node.summary ? `<small class="text-muted">${esc(node.summary)}</small>` : ''}
                    ${node.keywords && node.keywords.length ? `<div class="mt-1">${node.keywords.map(k => `<span class="badge bg-info bg-opacity-75 me-1">${esc(k)}</span>`).join('')}</div>` : ''}
                </div>
                <button class="btn btn-sm btn-outline-danger ms-2" onclick="deleteEvent('${escAttr(node.id)}')" title="删除">
                    <i data-feather="trash-2" style="width:14px;height:14px;"></i>
                </button>
            </div>
            ${timeDisplay ? `<small class="text-muted">${timeDisplay}</small>` : ''}
        </div>
        ${childrenHtml}`;
}

function toggleEvtChildren(id, el) {
    const container = document.getElementById(id);
    if (!container) return;
    container.classList.toggle('d-none');
    const icon = el.querySelector('svg');
    if (icon) icon.style.transform = container.classList.contains('d-none') ? 'rotate(-90deg)' : '';
}

// ========== Batch Import ==========

function showBatchImportModal() {
    document.getElementById('batchJsonInput').value = '';
    document.getElementById('batchError').classList.add('d-none');
    document.getElementById('batchSubmitBtn').disabled = false;
    new bootstrap.Modal(document.getElementById('batchImportModal')).show();
}

function fillBatchExample() {
    document.getElementById('batchJsonInput').value = JSON.stringify({
        "events": [
            {
                "title": "Standalone event",
                "summary": "A simple L0 event",
                "event_time_start": "2026-03-15T10:00:00+08:00",
                "importance": 5
            },
            {
                "title": "Daily Summary",
                "summary": "Summary of the day",
                "event_time_start": "2026-03-15T00:00:00+08:00",
                "event_time_end": "2026-03-15T23:59:59+08:00",
                "hierarchy_level": 1,
                "children": [
                    {
                        "title": "Morning standup",
                        "summary": "Discussed sprint progress",
                        "event_time_start": "2026-03-15T09:00:00+08:00",
                        "keywords": ["standup", "sprint"],
                        "importance": 6
                    }
                ]
            }
        ]
    }, null, 2);
}

async function submitBatchImport() {
    const errorEl = document.getElementById('batchError');
    const btn = document.getElementById('batchSubmitBtn');
    errorEl.classList.add('d-none');

    const raw = document.getElementById('batchJsonInput').value.trim();
    if (!raw) { errorEl.textContent = 'JSON 不能为空'; errorEl.classList.remove('d-none'); return; }

    let payload;
    try {
        payload = JSON.parse(raw);
    } catch (e) {
        errorEl.textContent = 'JSON 解析失败: ' + e.message;
        errorEl.classList.remove('d-none');
        return;
    }

    if (!payload.events || !Array.isArray(payload.events) || payload.events.length === 0) {
        errorEl.textContent = '请求体必须包含非空的 events 数组';
        errorEl.classList.remove('d-none');
        return;
    }

    btn.disabled = true;
    btn.textContent = '导入中...';
    try {
        const resp = await fetch(`/api/agents/${encodeURIComponent(selectedAgentId)}/base/events`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        if (!resp.ok) {
            let detail = `HTTP ${resp.status}`;
            try { const errData = await resp.json(); detail = errData.detail || errData.message || detail; } catch {}
            throw new Error(detail);
        }
        const data = await resp.json();
        bootstrap.Modal.getInstance(document.getElementById('batchImportModal')).hide();
        alert(`导入成功: ${data.data?.count ?? '?'} 条事件`);
        loadAgentDetail(selectedAgentId);
    } catch (e) {
        errorEl.textContent = '导入失败: ' + e.message;
        errorEl.classList.remove('d-none');
    } finally {
        btn.disabled = false;
        btn.textContent = '导入';
    }
}

// ========== Create Agent ==========

async function createAgent() {
    const agentId = document.getElementById('newAgentId').value.trim();
    const name = document.getElementById('newAgentName').value.trim();
    const desc = document.getElementById('newAgentDesc').value.trim();
    if (!agentId || !name) { alert('Agent ID 和名称不能为空'); return; }

    try {
        const resp = await fetch('/api/agents', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({agent_id: agentId, name, description: desc})
        });
        if (!resp.ok) { const d = await resp.json(); throw new Error(d.detail || 'Create failed'); }
        bootstrap.Modal.getInstance(document.getElementById('createAgentModal')).hide();
        document.getElementById('newAgentId').value = '';
        document.getElementById('newAgentName').value = '';
        document.getElementById('newAgentDesc').value = '';
        await loadAgentList();
        selectAgent(agentId);
    } catch (e) {
        alert('创建失败: ' + e.message);
    }
}

// ========== Utilities ==========

function esc(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = String(str);
    return div.innerHTML;
}

function escAttr(str) {
    return esc(str).replace(/'/g, '&#39;');
}
</script>
