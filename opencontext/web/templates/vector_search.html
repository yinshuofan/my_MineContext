{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">事件搜索</h1>
</div>

<div class="row">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">搜索参数</h5>
            </div>
            <div class="card-body">
                <form id="eventSearchForm">
                    <div class="mb-3">
                        <label for="query" class="form-label">查询内容</label>
                        <textarea class="form-control" id="query" rows="3" maxlength="2000" placeholder="输入语义搜索内容..."></textarea>
                        <div class="form-text">支持自然语言查询</div>
                    </div>

                    <div class="mb-3">
                        <label for="topK" class="form-label">返回数量 (Top-K)</label>
                        <input type="number" class="form-control" id="topK" value="20" min="1" max="100">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">层级过滤</label>
                        <div id="hierarchyLevels">
                            <div class="form-check">
                                <input class="form-check-input hierarchy-level-cb" type="checkbox" value="0" id="level0">
                                <label class="form-check-label" for="level0">L0 原始事件</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input hierarchy-level-cb" type="checkbox" value="1" id="level1">
                                <label class="form-check-label" for="level1">L1 日总结</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input hierarchy-level-cb" type="checkbox" value="2" id="level2">
                                <label class="form-check-label" for="level2">L2 周总结</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input hierarchy-level-cb" type="checkbox" value="3" id="level3">
                                <label class="form-check-label" for="level3">L3 月总结</label>
                            </div>
                        </div>
                        <div class="form-text">不选则不过滤层级</div>
                    </div>

                    <div class="mb-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="drillUp" checked>
                            <label class="form-check-label" for="drillUp">向上追溯祖先链</label>
                        </div>
                        <div class="form-text">开启后以树形结构显示层级关系</div>
                    </div>

                    <div class="mb-3">
                        <label for="startTime" class="form-label">开始时间</label>
                        <input type="datetime-local" class="form-control" id="startTime">
                    </div>

                    <div class="mb-3">
                        <label for="endTime" class="form-label">结束时间</label>
                        <input type="datetime-local" class="form-control" id="endTime">
                    </div>

                    <div class="mb-3">
                        <label for="userId" class="form-label">用户ID</label>
                        <input type="text" class="form-control" id="userId" placeholder="输入用户ID">
                    </div>

                    <div class="mb-3">
                        <label for="deviceId" class="form-label">设备ID</label>
                        <input type="text" class="form-control" id="deviceId" placeholder="输入设备ID">
                    </div>

                    <div class="mb-3">
                        <label for="agentId" class="form-label">代理ID</label>
                        <input type="text" class="form-control" id="agentId" placeholder="输入代理ID">
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        <span class="spinner-border spinner-border-sm d-none" role="status" id="loadingSpinner"></span>
                        <span id="searchButtonText">开始搜索</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-8">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">搜索结果</h5>
                <span class="badge bg-secondary" id="resultCount">0 条命中</span>
            </div>
            <div class="card-body">
                <div id="searchMetadata" class="d-none mb-3"></div>
                <div id="searchResults">
                    <div class="text-muted text-center py-5">
                        <i data-feather="search" class="mb-3" style="width: 48px; height: 48px;"></i>
                        <p>输入查询内容或选择层级过滤，然后点击"开始搜索"</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<style>
.event-card { transition: box-shadow 0.15s; }
.event-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.level-badge { font-size: 0.75rem; font-weight: 600; }
.level-badge-0 { background-color: #6c757d; }
.level-badge-1 { background-color: #0d6efd; }
.level-badge-2 { background-color: #6f42c1; }
.level-badge-3 { background-color: #d63384; }
.summary-text { max-height: 4.5em; overflow: hidden; position: relative; }
.summary-text.expanded { max-height: none; }
.score-badge { font-size: 0.8rem; }
.tree-children { padding-left: 20px; border-left: 2px solid; margin-left: 8px; margin-top: 4px; }
.tree-children-0 { border-color: #6c757d; }
.tree-children-1 { border-color: #0d6efd; }
.tree-children-2 { border-color: #6f42c1; }
.tree-children-3 { border-color: #d63384; }
.context-card { background-color: #f8f9fa; border-left: 3px solid; border-radius: 4px; padding: 10px 14px; margin-bottom: 8px; }
.context-card-0 { border-left-color: #6c757d; }
.context-card-1 { border-left-color: #0d6efd; }
.context-card-2 { border-left-color: #6f42c1; }
.context-card-3 { border-left-color: #d63384; }
.toggle-btn { cursor: pointer; user-select: none; }
.toggle-btn:hover { opacity: 0.7; }
</style>

<script>
const LEVEL_LABELS = {0: 'L0 原始事件', 1: 'L1 日总结', 2: 'L2 周总结', 3: 'L3 月总结'};
const LEVEL_SHORT = {0: 'L0', 1: 'L1', 2: 'L2', 3: 'L3'};

document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('eventSearchForm').addEventListener('submit', handleSearch);
});

async function handleSearch(event) {
    event.preventDefault();

    const query = document.getElementById('query').value.trim();
    const topK = parseInt(document.getElementById('topK').value) || 20;
    const drillUp = document.getElementById('drillUp').checked;
    const startTime = document.getElementById('startTime').value;
    const endTime = document.getElementById('endTime').value;
    const userId = document.getElementById('userId').value.trim();
    const deviceId = document.getElementById('deviceId').value.trim();
    const agentId = document.getElementById('agentId').value.trim();

    const selectedLevels = Array.from(document.querySelectorAll('.hierarchy-level-cb:checked'))
        .map(cb => parseInt(cb.value));

    const hasQuery = query.length > 0;
    const hasLevels = selectedLevels.length > 0;
    const hasTimeRange = startTime || endTime;

    if (!hasQuery && !hasLevels && !hasTimeRange) {
        displayError('请至少输入查询内容、选择层级过滤或设置时间范围');
        return;
    }

    setLoading(true);

    try {
        const requestBody = {
            top_k: topK,
            drill_up: drillUp
        };

        if (hasQuery) requestBody.query = query;
        if (hasLevels) requestBody.hierarchy_levels = selectedLevels;
        if (userId) requestBody.user_id = userId;
        if (deviceId) requestBody.device_id = deviceId;
        if (agentId) requestBody.agent_id = agentId;

        if (hasTimeRange) {
            requestBody.time_range = {};
            if (startTime) requestBody.time_range.start = Math.floor(new Date(startTime).getTime() / 1000);
            if (endTime) requestBody.time_range.end = Math.floor(new Date(endTime).getTime() / 1000);
        }

        const response = await fetch('/api/search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestBody)
        });
        const data = await response.json();

        if (!response.ok) {
            const detail = data.detail;
            if (Array.isArray(detail)) {
                throw new Error(detail.map(d => d.msg || JSON.stringify(d)).join('; '));
            }
            throw new Error(detail || '搜索失败');
        }

        if (!data.success) {
            throw new Error(data.message || '搜索失败');
        }

        displayMetadata(data.metadata);
        displayResults(data.events);

    } catch (error) {
        console.error('Search error:', error);
        displayError(error.message);
    } finally {
        setLoading(false);
    }
}

function setLoading(loading) {
    const spinner = document.getElementById('loadingSpinner');
    const buttonText = document.getElementById('searchButtonText');
    const submitButton = document.querySelector('#eventSearchForm button[type="submit"]');

    if (loading) {
        spinner.classList.remove('d-none');
        buttonText.textContent = '搜索中...';
        submitButton.disabled = true;
    } else {
        spinner.classList.add('d-none');
        buttonText.textContent = '开始搜索';
        submitButton.disabled = false;
    }
}

function displayMetadata(metadata) {
    const container = document.getElementById('searchMetadata');
    if (!metadata) {
        container.classList.add('d-none');
        return;
    }
    container.classList.remove('d-none');
    const queryText = metadata.query ? `查询: <strong>${escapeHtml(metadata.query)}</strong>` : '过滤搜索';
    container.innerHTML = `
        <div class="d-flex gap-3 text-muted small flex-wrap">
            <span>${queryText}</span>
            <span>命中: <strong>${metadata.total_results}</strong></span>
            <span>耗时: <strong>${metadata.search_time_ms.toFixed(0)} ms</strong></span>
        </div>
    `;
}

function countSearchHits(nodes) {
    let count = 0;
    for (const node of nodes) {
        if (node.is_search_hit) count++;
        if (node.children && node.children.length > 0) {
            count += countSearchHits(node.children);
        }
    }
    return count;
}

function displayResults(events) {
    const container = document.getElementById('searchResults');
    const resultCount = document.getElementById('resultCount');

    const hitCount = countSearchHits(events);
    resultCount.textContent = `${hitCount} 条命中`;

    if (!events || events.length === 0) {
        container.innerHTML = `
            <div class="text-muted text-center py-5">
                <i data-feather="inbox" class="mb-3" style="width: 48px; height: 48px;"></i>
                <p>未找到匹配的事件</p>
            </div>
        `;
        feather.replace();
        return;
    }

    let html = '';
    events.forEach(node => {
        html += renderTreeNode(node);
    });

    container.innerHTML = html;
    feather.replace();
}

function renderTreeNode(node) {
    const level = node.hierarchy_level || 0;

    if (node.is_search_hit) {
        return renderSearchHitCard(node) + renderChildren(node);
    } else {
        return renderContextCard(node) + renderChildren(node);
    }
}

function renderChildren(node) {
    if (!node.children || node.children.length === 0) return '';

    const level = node.hierarchy_level || 0;
    const childrenId = 'children-' + node.id.replace(/[^a-zA-Z0-9]/g, '');

    let childrenHtml = '';
    node.children.forEach(child => {
        childrenHtml += renderTreeNode(child);
    });

    return `<div class="tree-children tree-children-${level}" id="${childrenId}">${childrenHtml}</div>`;
}

function renderSearchHitCard(event) {
    const level = event.hierarchy_level || 0;
    const title = event.title || '未命名事件';
    const summary = event.summary || '';
    const timeBucket = event.time_bucket || '';
    const eventTime = event.event_time ? new Date(event.event_time).toLocaleString('zh-CN') : '';
    const createTime = event.create_time ? new Date(event.create_time).toLocaleString('zh-CN') : '';
    const displayTime = eventTime || createTime;
    const score = event.score || 0;
    const scoreColor = score >= 0.9 ? 'success' : score >= 0.7 ? 'primary' : 'secondary';
    const cardId = 'card-' + event.id.replace(/[^a-zA-Z0-9]/g, '');

    const keywords = (event.keywords || [])
        .map(k => `<span class="badge bg-info bg-opacity-75 me-1">${escapeHtml(k)}</span>`)
        .join('');

    let summaryHtml = '';
    if (summary) {
        const needsTruncate = summary.length > 200;
        const summaryId = 'summary-' + cardId;
        summaryHtml = `
            <div class="summary-text${needsTruncate ? '' : ' expanded'}" id="${summaryId}">
                <p class="mb-0 text-muted">${escapeHtml(summary)}</p>
            </div>
            ${needsTruncate ? `<a href="#" class="small text-decoration-none" onclick="toggleSummary('${summaryId}', this); return false;">展开</a>` : ''}
        `;
    }

    const hasChildren = event.children && event.children.length > 0;
    const childrenId = 'children-' + event.id.replace(/[^a-zA-Z0-9]/g, '');
    const toggleHtml = hasChildren ? `
        <span class="toggle-btn small text-muted ms-2" onclick="toggleChildren('${childrenId}', this)">
            <i data-feather="chevron-down" style="width: 14px; height: 14px;"></i>
        </span>` : '';

    return `
        <div class="border rounded mb-2 p-3 event-card">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <div class="d-flex align-items-center gap-2 flex-wrap">
                    <span class="badge level-badge level-badge-${level}">${LEVEL_SHORT[level] || 'L?'}</span>
                    <h6 class="mb-0">
                        <a href="#" onclick="viewContext('${event.id}', 'event'); return false;" class="text-decoration-none">${escapeHtml(title)}</a>
                    </h6>
                    ${timeBucket ? `<small class="text-muted">${escapeHtml(timeBucket)}</small>` : ''}
                    ${toggleHtml}
                </div>
                <span class="badge bg-${scoreColor} score-badge">${score.toFixed(4)}</span>
            </div>
            ${summaryHtml}
            ${keywords ? `<div class="mt-2">${keywords}</div>` : ''}
            <div class="d-flex justify-content-between align-items-center mt-2">
                ${displayTime ? `<small class="text-muted">${eventTime ? '事件时间' : '创建时间'}: ${displayTime}</small>` : '<span></span>'}
                <button onclick="viewContext('${event.id}', 'event')" class="btn btn-sm btn-outline-primary">查看详情</button>
            </div>
        </div>
    `;
}

function renderContextCard(node) {
    const level = node.hierarchy_level || 0;
    const title = node.title || '';
    const summary = node.summary || '';
    const timeBucket = node.time_bucket || '';

    const hasChildren = node.children && node.children.length > 0;
    const childrenId = 'children-' + node.id.replace(/[^a-zA-Z0-9]/g, '');
    const toggleHtml = hasChildren ? `
        <span class="toggle-btn" onclick="toggleChildren('${childrenId}', this)">
            <i data-feather="chevron-down" style="width: 14px; height: 14px;"></i>
        </span>` : '';

    const titleHtml = title ? `<strong class="ms-1">${escapeHtml(title)}</strong>` : '';
    const summaryHtml = summary ? `<p class="mb-0 text-muted small mt-1">${escapeHtml(summary)}</p>` : '';

    return `
        <div class="context-card context-card-${level} mb-2">
            <div class="d-flex align-items-center gap-2">
                ${toggleHtml}
                <span class="badge level-badge level-badge-${level}">${LEVEL_SHORT[level] || 'L?'}</span>
                ${timeBucket ? `<small class="text-muted">${escapeHtml(timeBucket)}</small>` : ''}
                ${titleHtml}
            </div>
            ${summaryHtml}
        </div>
    `;
}

function toggleChildren(id, el) {
    const container = document.getElementById(id);
    if (!container) return;
    container.classList.toggle('d-none');
    const icon = el.querySelector('svg');
    if (icon) {
        const isHidden = container.classList.contains('d-none');
        icon.style.transform = isHidden ? 'rotate(-90deg)' : '';
    }
}

function toggleSummary(id, link) {
    const el = document.getElementById(id);
    if (el) {
        el.classList.toggle('expanded');
        link.textContent = el.classList.contains('expanded') ? '收起' : '展开';
    }
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function displayError(message) {
    const container = document.getElementById('searchResults');
    const metaContainer = document.getElementById('searchMetadata');
    metaContainer.classList.add('d-none');
    document.getElementById('resultCount').textContent = '0 条命中';
    container.innerHTML = `
        <div class="alert alert-danger">
            <i data-feather="alert-circle" class="me-2"></i>
            搜索出错: ${escapeHtml(message)}
        </div>
    `;
    feather.replace();
}

async function viewContext(contextId, contextType) {
    try {
        const response = await fetch('/contexts/detail', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: contextId, context_type: contextType })
        });

        if (response.ok) {
            const html = await response.text();
            document.open();
            document.write(html);
            document.close();
        } else {
            alert('查看失败');
        }
    } catch (error) {
        console.error('查看操作失败:', error);
        alert('查看操作失败');
    }
}
</script>
{% endblock %}
