repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: frontend-lint
        name: Run frontend lint before commit
        entry: bash -c "cd frontend && pnpm run typecheck"
        language: system
